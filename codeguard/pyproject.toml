[build-system]
requires = ["setuptools>=68.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "codeguard-ai"
version = "0.2.2"
description = "Ethical AI Code Review Agent for private GitHub repositories"
requires-python = ">=3.10"
dependencies = [
    "langgraph>=0.2.0",
    "langchain>=0.3.0",
    "langchain-core>=0.3.0",
    "langchain-groq>=0.2.0",
    "groq>=0.9.0",
    "requests>=2.31.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
    "typer>=0.12.0"
]

[project.scripts]
codeguard = "codeguard.cli:main"